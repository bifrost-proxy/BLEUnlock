name: CI

on:
  push:
    branches:
      - master
    tags-ignore:
      - "*"
  pull_request:
    branches:
      - master

jobs:
  build:

    runs-on: macOS-latest
    
    steps:
    - uses: actions/checkout@v6
    - name: Validate installer
      run: |
        bash -n install.sh
        bash install.sh --help
        bash -n scripts/build-local.sh
        bash -n scripts/profile-background.sh
        bash -n scripts/sign-macos-app.sh
        bash -n scripts/verify-macos-dmg.sh
        bash -n scripts/test-update-installer.sh
    - name: Build release configuration
      run: |
        xcodebuild clean build \
          -project BLEUnlock.xcodeproj \
          -scheme BLEUnlock \
          -configuration Release \
          -derivedDataPath build-ci \
          CODE_SIGNING_ALLOWED=NO
    - name: Ad-hoc sign release app
      env:
        MACOS_SIGNING_IDENTITY: "-"
        MACOS_ENTITLEMENTS_PATH: BLEUnlock/BLEUnlock.entitlements
      run: bash scripts/sign-macos-app.sh build-ci/Build/Products/Release/BLEUnlock.app
    - name: Package and verify release DMG
      run: |
        hdiutil create \
          -volname BLEUnlock \
          -srcfolder build-ci/Build/Products/Release/BLEUnlock.app \
          -ov \
          -format UDZO \
          build-ci/BLEUnlock-ci.dmg
        bash scripts/verify-macos-dmg.sh build-ci/BLEUnlock-ci.dmg
