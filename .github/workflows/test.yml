name: CI

on:
  push:
    branches:
      - master
    tags-ignore:
      - "*"
  pull_request:
    branches:
      - master

jobs:
  build:

    runs-on: macOS-latest
    
    steps:
    - uses: actions/checkout@v6
    - name: Validate installer
      run: |
        bash -n install.sh
        bash install.sh --help
        bash -n scripts/build-local.sh
        bash -n scripts/profile-background.sh
    - name: Start xcodebuild test
      run: xcodebuild clean build -project BLEUnlock.xcodeproj -scheme BLEUnlock CODE_SIGNING_ALLOWED=NO
