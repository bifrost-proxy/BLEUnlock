name: Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to build and release"
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

    steps:
      - name: Import Code Signing Certificate
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "${MACOS_CERT_P12_BASE64}" ]; then
            echo "MACOS_CERT_P12_BASE64 is not set. Skipping code signing."
            exit 0
          fi

          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          CERT_PATH="$RUNNER_TEMP/cert.p12"

          echo "${MACOS_CERT_P12_BASE64}" | base64 --decode > "${CERT_PATH}"

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERT_PATH}" -k "${KEYCHAIN_PATH}" -P "${MACOS_CERT_PASSWORD}" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "${KEYCHAIN_PATH}"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

      - name: Build Release App
        run: |
          VERSION="${RELEASE_TAG#v}"
          xcodebuild \
            -project BLEUnlock.xcodeproj \
            -scheme BLEUnlock \
            -configuration Release \
            -derivedDataPath build \
            MARKETING_VERSION="${VERSION}" \
            CURRENT_PROJECT_VERSION="${GITHUB_RUN_NUMBER}" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Code Sign App
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          if [ -z "${MACOS_SIGNING_IDENTITY}" ]; then
            echo "MACOS_SIGNING_IDENTITY is not set. Skipping code signing."
            exit 0
          fi

          APP_PATH="build/Build/Products/Release/BLEUnlock.app"
          ENTITLEMENTS_PATH="BLEUnlock/BLEUnlock.entitlements"
          /usr/bin/codesign --force --deep --options runtime --entitlements "${ENTITLEMENTS_PATH}" --sign "${MACOS_SIGNING_IDENTITY}" "${APP_PATH}"

      - name: Install create-dmg
        run: |
          npm install -g create-dmg

      - name: Package DMG
        run: |
          APP_PATH="build/Build/Products/Release/BLEUnlock.app"
          DEST_DIR="build/Build/Products/Release"
          create-dmg \
            --overwrite \
            --no-code-sign \
            --no-version-in-filename \
            "${APP_PATH}" \
            "${DEST_DIR}"
          mv "${DEST_DIR}/BLEUnlock.dmg" "${DEST_DIR}/BLEUnlock-${RELEASE_TAG}.dmg"

      - name: Create or Update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DMG_PATH="build/Build/Products/Release/BLEUnlock-${RELEASE_TAG}.dmg"
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${DMG_PATH}" --clobber
            gh release edit "${RELEASE_TAG}" --title "${RELEASE_TAG}" --notes-file <(sed -n "/^## ${RELEASE_TAG#v}/,/^## /p" CHANGELOG.md | sed "$d")
          else
            gh release create "${RELEASE_TAG}" \
              "${DMG_PATH}" \
              --title "${RELEASE_TAG}" \
              --notes-file <(sed -n "/^## ${RELEASE_TAG#v}/,/^## /p" CHANGELOG.md | sed "$d")
          fi

      - name: Update Homebrew Tap
        env:
          TAP_PUSH_TOKEN: ${{ secrets.TAP_PUSH_TOKEN }}
        run: |
          if [ -z "${TAP_PUSH_TOKEN}" ]; then
            echo "TAP_PUSH_TOKEN is not set. Skipping Homebrew tap update."
            exit 0
          fi

          VERSION="${RELEASE_TAG#v}"
          DMG_PATH="build/Build/Products/Release/BLEUnlock-${RELEASE_TAG}.dmg"
          SHA256="$(shasum -a 256 "${DMG_PATH}" | awk '{print $1}')"
          TAP_DIR="${RUNNER_TEMP}/homebrew-tap"
          CASK_PATH="${TAP_DIR}/Casks/bleunlock.rb"

          git clone "https://x-access-token:${TAP_PUSH_TOKEN}@github.com/Skyearn/homebrew-tap.git" "${TAP_DIR}"

          python3 - <<PY
          from pathlib import Path

          path = Path("${CASK_PATH}")
          text = path.read_text()
          text = text.replace(text.split('version "')[1].split('"')[0], "${VERSION}", 1)
          text = text.replace(text.split('sha256 "')[1].split('"')[0], "${SHA256}", 1)
          path.write_text(text)
          PY

          cd "${TAP_DIR}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- Casks/bleunlock.rb; then
            echo "Homebrew tap is already up to date."
            exit 0
          fi

          git add Casks/bleunlock.rb
          git commit -m "Update BLEUnlock to ${RELEASE_TAG}"
          git push origin main
